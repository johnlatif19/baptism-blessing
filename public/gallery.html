<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Blessing | Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FDF8F0;
            --champagne: #F5E6D3;
            --beige: #E8D5C4;
            --blush: #F5D6D6;
            --warm-white: #FFF9F5;
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --gold-dark: #B8944A;
            --marble: #F5F0EB;
            --text-dark: #2C1810;
            --text-gold: #A67C52;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFF9F5;
            --bg-card: #ffffff;
            --text-primary: #2C1810;
            --text-secondary: #A67C52;
            --border-color: rgba(201, 169, 110, 0.1);
            --shadow-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(253, 248, 240, 0.92);
            --footer-bg: #2C1810;
            --footer-text: #FFF9F5;
            --transition: all 0.4s ease;
            --overlay: rgba(0,0,0,0.85);
        }

        [data-theme="dark"] {
            --ivory: #1a1410;
            --champagne: #2a1f18;
            --beige: #33261e;
            --blush: #2a1a1a;
            --warm-white: #1f1814;
            --marble: #1a1410;
            --text-dark: #f5ede8;
            --text-gold: #d4b896;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: rgba(30, 20, 15, 0.6);
            --glass-border: rgba(200, 180, 160, 0.15);
            --bg-primary: #1a1410;
            --bg-secondary: #1f1814;
            --bg-card: #2a1f18;
            --text-primary: #f5ede8;
            --text-secondary: #d4b896;
            --border-color: rgba(200, 180, 160, 0.1);
            --shadow-color: rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 20, 16, 0.92);
            --footer-bg: #0d0a08;
            --footer-text: #f5ede8;
            --overlay: rgba(0,0,0,0.9);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 5%;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 40px;
            height: 40px;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .theme-toggle, .lang-toggle, .face-search-btn, .show-all-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .theme-toggle:hover, .lang-toggle:hover, .show-all-btn:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .theme-toggle svg, .lang-toggle svg {
            width: 18px;
            height: 18px;
        }

        .face-search-btn {
            background: var(--gold);
            color: var(--text-dark);
            border-color: var(--gold);
            font-weight: 600;
        }

        .face-search-btn:hover {
            background: var(--gold-dark);
            border-color: var(--gold-dark);
            color: white;
        }

        .face-search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .show-all-btn {
            display: none;
            background: var(--bg-card);
            border-color: var(--border-color);
        }

        .show-all-btn:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .back-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold-dark);
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-btn:hover {
            background: var(--gold);
            color: white;
        }

        .main-content {
            padding: 8rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 3.5vw, 3rem);
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .page-title .gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-status {
            text-align: center;
            padding: 0.75rem 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: none;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .search-status.active {
            display: block;
        }

        .search-status .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            aspect-ratio: 1;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-card);
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 40px var(--shadow-color);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .match-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--gold);
            color: var(--text-dark);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .gallery-item .download-btn {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
        }

        .gallery-item:hover .download-btn {
            opacity: 1;
        }

        .gallery-item .download-btn:hover {
            background: var(--gold);
            color: var(--text-dark);
        }

        .empty-gallery {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 24px;
            border: 2px dashed var(--gold);
            grid-column: 1 / -1;
        }

        .empty-gallery .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-gallery h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-dark);
            margin-bottom: 0.5rem;
        }

        .empty-gallery p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Poppins', sans-serif;
            transition: transform 0.3s ease;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
        }

        .lightbox-download {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--text-dark);
            border: none;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
        }

        .lightbox-download:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .footer {
            background: var(--footer-bg);
            color: var(--footer-text);
            padding: 3rem 5%;
            text-align: center;
            margin-top: 2rem;
            transition: var(--transition);
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .footer p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .footer .heart {
            color: var(--blush);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .gallery-item .download-btn {
                opacity: 1;
                bottom: 0.5rem;
                right: 0.5rem;
                padding: 0.3rem 0.7rem;
                font-size: 0.7rem;
            }

            .gallery-item .match-badge {
                font-size: 0.6rem;
                padding: 0.2rem 0.6rem;
                top: 0.5rem;
                left: 0.5rem;
            }

            .lightbox img {
                max-width: 95%;
                max-height: 75%;
            }

            .lightbox-download {
                bottom: 1rem;
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }

            .nav-controls {
                gap: 0.4rem;
            }

            .face-search-btn, .show-all-btn, .theme-toggle, .lang-toggle {
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
            }

            .back-btn {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 500px) {
            .nav-controls .theme-toggle span,
            .nav-controls .lang-toggle span {
                display: none;
            }

            .face-search-btn span:not(.icon) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#C9A96E" stroke-width="2"/>
                <text x="50" y="58" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" fill="#C9A96E" font-weight="700">✝</text>
                <text x="50" y="78" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" fill="#A67C52" font-weight="400">BAPTISM</text>
            </svg>
            <span class="nav-logo-text">Baptism Blessing</span>
        </a>
        <div class="nav-controls">
            <button class="face-search-btn" id="faceSearchBtn">
                <span class="icon">🔍</span>
                <span>Search by Face</span>
            </button>
            <button class="show-all-btn" id="showAllBtn">
                <span>📷</span>
                <span>Show All</span>
            </button>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span id="themeLabel">Light</span>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Toggle language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span id="langLabel">EN</span>
            </button>
            <a href="/" class="back-btn">← Back</a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title"><span data-i18n="photo.title">Photo</span> <span class="gold" data-i18n="photo.gallery">Gallery</span></h1>
        
        <div class="search-status" id="searchStatus">
            <span class="spinner"></span>
            <span id="searchStatusText">Searching for similar faces...</span>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery images will be loaded here -->
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <img id="lightboxImage" src="" alt="Gallery image">
        <button class="lightbox-download" id="lightboxDownload">⬇ Download</button>
    </div>

    <footer class="footer">
        <div class="footer-logo">Baptism Blessing</div>
        <p>Baptism Blessing © 2026</p>
    </footer>

    <script>
        // ==================== TRANSLATIONS ====================
        const translations = {
            en: {
                'photo.title': 'Photo',
                'photo.gallery': 'Gallery',
                'photo.empty': 'No photos yet',
                'photo.emptySub': 'Photos will be added after the baptism ceremony',
                'face.searching': 'Searching for similar faces...',
                'face.noResults': 'No matching faces found',
                'face.error': 'Error during face search'
            },
            ar: {
                'photo.title': 'معرض',
                'photo.gallery': 'الصور',
                'photo.empty': 'لا توجد صور بعد',
                'photo.emptySub': 'سيتم إضافة الصور بعد حفل المعمودية',
                'face.searching': 'جاري البحث عن وجوه مشابهة...',
                'face.noResults': 'لم يتم العثور على وجوه مطابقة',
                'face.error': 'حدث خطأ أثناء البحث بالوجه'
            }
        };

        // ==================== STATE ====================
        let currentLang = 'en';
        let currentTheme = 'light';
        let currentImageUrl = '';
        let allImages = [];
        let isSearchMode = false;

        // ==================== THEME & LANGUAGE ====================
        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
            localStorage.setItem('theme', theme);
            const label = document.getElementById('themeLabel');
            label.textContent = theme === 'dark' ? 'Dark' : 'Light';
            const btn = document.getElementById('themeToggle');
            if (theme === 'dark') {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <span id="themeLabel">Dark</span>
                `;
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span id="themeLabel">Light</span>
                `;
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langLabel').textContent = lang === 'ar' ? 'AR' : 'EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        document.getElementById('langToggle').addEventListener('click', function() {
            setLanguage(currentLang === 'en' ? 'ar' : 'en');
        });

        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedLang = localStorage.getItem('language') || 'en';
        setTheme(savedTheme);
        setLanguage(savedLang);

        // ==================== UTILITY FUNCTIONS ====================
        function downloadFile(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename || url.split('/').pop().split('?')[0] || 'download';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                })
                .catch(() => {
                    window.open(url, '_blank');
                });
        }

        function openLightbox(src) {
            currentImageUrl = src;
            document.getElementById('lightboxImage').src = src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        document.getElementById('lightboxDownload').addEventListener('click', function() {
            if (currentImageUrl) {
                const filename = currentImageUrl.split('/').pop().split('?')[0] || 'image.jpg';
                downloadFile(currentImageUrl, filename);
            }
        });

        // ==================== SEARCH STATUS ====================
        function showSearchStatus(message, isLoading = true) {
            const status = document.getElementById('searchStatus');
            const text = document.getElementById('searchStatusText');
            status.classList.add('active');
            if (isLoading) {
                text.innerHTML = `<span class="spinner"></span> ${message}`;
            } else {
                text.textContent = message;
            }
        }

        function hideSearchStatus() {
            document.getElementById('searchStatus').classList.remove('active');
        }

        // ==================== RENDER GALLERY ====================
        function renderGallery(images) {
            const grid = document.getElementById('galleryGrid');

            if (!images || images.length === 0) {
                grid.innerHTML = `
                    <div class="empty-gallery">
                        <div class="icon">${isSearchMode ? '🔍' : '📸'}</div>
                        <h3>${isSearchMode ? 'No matching faces found' : 'No photos yet'}</h3>
                        <p>${isSearchMode ? 'Try uploading a different photo' : 'Photos will be added after the baptism ceremony'}</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';
            images.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';

                const imgEl = document.createElement('img');
                imgEl.src = img.url;
                imgEl.alt = img.title || 'Gallery image';
                imgEl.loading = 'lazy';
                imgEl.addEventListener('click', function(e) {
                    if (!e.target.closest('.download-btn') && !e.target.closest('.match-badge')) {
                        openLightbox(img.url);
                    }
                });

                // Match badge for search results
                if (isSearchMode && img.similarity) {
                    const badge = document.createElement('div');
                    badge.className = 'match-badge';
                    badge.textContent = `${Math.round(img.similarity * 100)}% match`;
                    item.appendChild(badge);
                }

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerHTML = '⬇ Download';
                downloadBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const filename = img.url.split('/').pop().split('?')[0] || 'image.jpg';
                    downloadFile(img.url, filename);
                });

                item.appendChild(imgEl);
                item.appendChild(downloadBtn);
                grid.appendChild(item);
            });
        }

        // ==================== LOAD GALLERY ====================
        async function loadGallery() {
            try {
                const response = await fetch('/api/gallery');
                if (response.ok) {
                    const images = await response.json();
                    allImages = images;
                    isSearchMode = false;
                    document.getElementById('showAllBtn').style.display = 'none';
                    hideSearchStatus();
                    renderGallery(images);
                }
            } catch (error) {
                console.error('Error loading gallery:', error);
                renderGallery([]);
            }
        }

        // ==================== FACE SEARCH ====================
        document.getElementById('faceSearchBtn').addEventListener('click', function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';

            input.onchange = async function(e) {
                if (this.files && this.files[0]) {
                    const file = this.files[0];
                    const formData = new FormData();
                    formData.append('image', file);

                    const btn = document.getElementById('faceSearchBtn');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '⏳ Searching...';
                    btn.disabled = true;

                    showSearchStatus(translations[currentLang]['face.searching'] || 'Searching for similar faces...');

                    try {
                        const response = await fetch('/api/search-face', {
                            method: 'POST',
                            body: formData
                        });

                        const data = await response.json();

                        if (data.success && data.matches && data.matches.length > 0) {
                            isSearchMode = true;
                            document.getElementById('showAllBtn').style.display = 'flex';

                            const results = data.matches.map(match => ({
                                ...match.image,
                                similarity: match.similarity
                            }));

                            hideSearchStatus();
                            renderGallery(results);

                            // Show result count briefly
                            const countMessage = `Found ${results.length} matching faces`;
                            showSearchStatus(countMessage, false);
                            setTimeout(hideSearchStatus, 3000);
                        } else {
                            hideSearchStatus();
                            showSearchStatus(translations[currentLang]['face.noResults'] || 'No matching faces found', false);
                            renderGallery([]);
                            isSearchMode = true;
                            document.getElementById('showAllBtn').style.display = 'flex';
                        }
                    } catch (error) {
                        console.error('Search error:', error);
                        hideSearchStatus();
                        showSearchStatus(translations[currentLang]['face.error'] || 'Error during face search', false);
                        setTimeout(hideSearchStatus, 3000);
                    } finally {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                }
            };

            input.click();
        });

        // ==================== SHOW ALL ====================
        document.getElementById('showAllBtn').addEventListener('click', function() {
            isSearchMode = false;
            this.style.display = 'none';
            hideSearchStatus();
            renderGallery(allImages);
        });

        // ==================== INIT ====================
        loadGallery();
    </script>
</body>
</html>
